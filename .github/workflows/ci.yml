name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex-analysis-branch

jobs:
  test:
    name: Lint, Test, and Visual QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:all

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Docs visual QA
        run: npm run test:docs:visual
