apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: recourse-validating-webhook
  labels:
    app.kubernetes.io/name: recourse
webhooks:
  - name: recourse.recourseos.dev
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: recourse-webhook
        namespace: recourse-system
        path: /validate
        port: 443
      # CA bundle will be injected by cert-manager or manually
      # caBundle: <base64-encoded-ca-cert>
    rules:
      # PersistentVolumeClaims - data loss risk
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["DELETE", "UPDATE"]
        resources: ["persistentvolumeclaims"]
        scope: "Namespaced"

      # PersistentVolumes - data loss risk
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["DELETE"]
        resources: ["persistentvolumes"]
        scope: "Cluster"

      # StatefulSets - stateful workloads
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["DELETE", "UPDATE"]
        resources: ["statefulsets"]
        scope: "Namespaced"

      # Namespaces - cascading deletion
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["DELETE"]
        resources: ["namespaces"]
        scope: "Cluster"

      # CRDs - cascading deletion of custom resources
      - apiGroups: ["apiextensions.k8s.io"]
        apiVersions: ["v1"]
        operations: ["DELETE"]
        resources: ["customresourcedefinitions"]
        scope: "Cluster"

      # Secrets - may break workloads
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["DELETE"]
        resources: ["secrets"]
        scope: "Namespaced"

    failurePolicy: Ignore  # Fail open - don't block cluster on webhook failure
    matchPolicy: Equivalent
    sideEffects: None
    timeoutSeconds: 10

    # Exclude system namespaces
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - recourse-system

    # Exclude resources with opt-out annotation
    objectSelector:
      matchExpressions:
        - key: recourse.dev/skip
          operator: NotIn
          values:
            - "true"
