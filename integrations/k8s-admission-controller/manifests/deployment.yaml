apiVersion: v1
kind: Namespace
metadata:
  name: recourse-system
  labels:
    app.kubernetes.io/name: recourse
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: recourse-webhook
  namespace: recourse-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recourse-webhook
  namespace: recourse-system
  labels:
    app: recourse-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recourse-webhook
  template:
    metadata:
      labels:
        app: recourse-webhook
    spec:
      serviceAccountName: recourse-webhook
      containers:
        - name: webhook
          image: ghcr.io/recourseos/admission-webhook:latest
          ports:
            - containerPort: 8443
              name: webhook
          env:
            - name: PORT
              value: "8443"
            - name: RECOURSE_API_URL
              value: "http://recourse-service.recourse-system:3001"
            - name: DRY_RUN
              value: "false"
            - name: ALLOWED_RISK_LEVELS
              value: "allow,warn"
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: webhook-certs
          secret:
            secretName: recourse-webhook-certs
---
apiVersion: v1
kind: Service
metadata:
  name: recourse-webhook
  namespace: recourse-system
spec:
  selector:
    app: recourse-webhook
  ports:
    - port: 443
      targetPort: 8443
      name: webhook
---
# RecourseOS API Service (optional - deploy if not using external RecourseOS)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recourse-service
  namespace: recourse-system
  labels:
    app: recourse-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recourse-service
  template:
    metadata:
      labels:
        app: recourse-service
    spec:
      containers:
        - name: recourse
          image: ghcr.io/recourseos/recourse:latest
          args: ["serve", "--port", "3001"]
          ports:
            - containerPort: 3001
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: recourse-service
  namespace: recourse-system
spec:
  selector:
    app: recourse-service
  ports:
    - port: 3001
      targetPort: 3001
